<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elegant Notes</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

<header>
    <h1>Quick Notes</h1>
    <div>
        <button class="add-note-btn" onclick="openNoteDialog()">+ Add Note</button>
        <button id="themeToggleBtn" class="theme-toggle-btn">🌙</button>
    </div>
</header>

<main id="notesContainer" class="notes-grid"></main>

<!-- NOTE DIALOG -->
<dialog id="noteDialog">
    <div class="dialog-content">
        
        <div class="dialog-header">
            <h2 class="dialog-title" id="dialogTitle">Add New Note</h2>
            <button class="close-btn" onclick="closeNoteDialog()">✖</button>
        </div>

        <form id="noteForm">

            <!-- TITLE -->
            <div class="form-group">
                <label for="noteTitle" class="form-label">Title</label>
                <input type="text" id="noteTitle" class="form-input" placeholder="Enter note title..." required>
            </div>

            <!-- CONTENT -->
            <div class="form-group">
                <label for="noteContent" class="form-label">Content</label>
                <textarea id="noteContent" class="form-textarea" placeholder="Write your note here..." required></textarea>
            </div>

            <!-- IMAGE UPLOAD 🔥 -->
            <div class="form-group">
                <label for="noteImage" class="form-label">Add Image (optional)</label>
                <input type="file" id="noteImage" class="form-input" accept="image/*">
            </div>

            <!-- IMAGE PREVIEW -->
            <div class="form-group">
                <img id="imagePreview" style="display:none; width:100%; max-height:200px; object-fit:cover; border-radius:12px;">
            </div>

            <!-- ACTIONS -->
            <div class="dialog-actions">
                <button type="button" class="cancel-btn" onclick="closeNoteDialog()">Cancel</button>
                <button type="submit" class="save-btn">Save Note</button>
            </div>

        </form>
    </div>
</dialog>

<footer>
    <p><strong>© 2026 All rights are preserved ● Made in India by Ayush Nandi</strong></p>
</footer>

</body>
</html>
